<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Socket Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <header>
        <h1>Weather Socket Monitor</h1>
        <p>Fake real-time weather monitoring using Node.js and Socket.IO</p>
    </header>

    <section class="control-panel">
        <div class="field">
            <label for="citySelect">City</label>
            <select id="citySelect">
                <option value="Kharkiv">Kharkiv</option>
                <option value="Kyiv">Kyiv</option>
                <option value="Lviv">Lviv</option>
                <option value="Odesa">Odesa</option>
                <option value="Dnipro">Dnipro</option>
            </select>
        </div>

        <div class="field">
            <label for="intervalSelect">Update frequency</label>
            <select id="intervalSelect">
                <option value="1000">Every 1 second</option>
                <option value="3000">Every 3 seconds</option>
                <option value="5000">Every 5 seconds</option>
            </select>
        </div>

        <div class="buttons">
            <button id="startButton">Start monitoring</button>
            <button id="stopButton">Stop</button>
        </div>
    </section>

    <section class="weather-card">
        <h2 id="cityName">No city selected</h2>

        <div class="weather-grid">
            <div class="weather-item">
                <span class="label">Temperature</span>
                <span id="temperature" class="value">-</span>
            </div>

            <div class="weather-item">
                <span class="label">Precipitation</span>
                <span id="precipitation" class="value">-</span>
            </div>

            <div class="weather-item">
                <span class="label">Pressure</span>
                <span id="pressure" class="value">-</span>
            </div>

            <div class="weather-item">
                <span class="label">Wind speed</span>
                <span id="windSpeed" class="value">-</span>
            </div>
        </div>

        <p class="updated">Last update: <span id="updateTime">-</span></p>
    </section>

    <section class="log-section">
        <h2>Update log</h2>
        <div id="log"></div>
    </section>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
